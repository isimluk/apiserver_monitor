          value: "1"
        - name: HTTP_TARGETS
          value: "https://www.google.com"
        - name: HTTP_TIMEOUT
          value: "5"
        volumeMounts:
        - name: scripts
          mountPath: /scripts
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
      volumes:
      - name: scripts
        configMap:
          name: network-monitor-scripts
          defaultMode: 0755

---
apiVersion: apps/v1
kind: Deployment
metadata: 
  name: network-monitor-k8s-svc
  namespace: monitoring
  labels:
    app: network-monitor
    component: k8s-svc
spec: 
  replicas: 1
  selector:
    matchLabels: 
      app: network-monitor
      component: k8s-svc
  template:
    metadata:
      labels:
        app: network-monitor
        component:  k8s-svc
    spec:
      serviceAccountName: network-monitor
      containers:
      - name:  k8s-svc-monitor
        image: nicolaka/netshoot:latest
        command: ["/bin/bash", "/scripts/k8s-service-monitor.sh"]
        env:
        - name: INTERVAL
          value: "0.5"
        - name: K8S_SERVICES
          value: "kubernetes.default.svc.cluster.local:443"
        - name:  DIAGNOSTIC_INTERVAL
          value:  "30"
        volumeMounts:
        - name: scripts
          mountPath: /scripts
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
      volumes:
      - name: scripts
        configMap:
          name: network-monitor-scripts
          defaultMode: 0755

---
apiVersion:  apps/v1
kind: DaemonSet
metadata:
  name: network-monitor-node
  namespace: monitoring
  labels:
    app: network-monitor
    component: node
spec: 
  selector:
    matchLabels:
      app: network-monitor
      component: node
  template:
    metadata:
      labels:
        app: network-monitor
        component: node
    spec:
      tolerations:
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      containers:
      - name: node-monitor
        image: nicolaka/netshoot:latest
        command: ["/bin/bash", "/scripts/ping-monitor.sh"]
        env:
        - name: INTERVAL
          value: "0.5"
        - name: PING_TARGETS
          value: "8.8.8.8,1.1.1.1"
        - name: PING_TIMEOUT
          value: "1"
        volumeMounts: 
        - name: scripts
          mountPath: /scripts
        resources: 
          requests:
            memory:  "64Mi"
            cpu:  "100m"
          limits: 
            memory: "128Mi"
            cpu: "200m"
      volumes:
      - name: scripts
        configMap: 
          name: network-monitor-scripts
          defaultMode: 0755

---
# ServiceAccount for API access
apiVersion: v1
kind: ServiceAccount
metadata: 
  name: network-monitor
  namespace: monitoring

---
# ClusterRole to read endpoints
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: network-monitor
rules:
- apiGroups: [""]
  resources:  ["endpoints", "services"]
  verbs:  ["get", "list"]

---
# Bind the role
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: network-monitor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name:  network-monitor
subjects:
- kind: ServiceAccount
  name:  network-monitor
  namespace: monitoring
